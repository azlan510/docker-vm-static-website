services:
  frontend:
    build: .
    ports:
      - "8080:80"
    networks:
      - fullstack-net

  database:
    image: mongo:latest
    ports:
      - "27017:27017"
    networks:
      - fullstack-net
    volumes:
      - db-data:/data/db

networks:
  fullstack-net:
    driver: bridge

volumes:
  db-data:
